<!DOCTYPE html>
<html lang="en">

<head>

  <!-- Basic page settings -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title -->
  <title>Cart | Viet Taste Kaffê</title>

  <!-- Link to main stylesheet -->
  <link rel="stylesheet" href="style.css">

</head>

<!-- Website header and nagigation -->  

<header>
    <h1>Viet Taste Kaffê</h1>

  <!-- Navigation  -->
  <nav> 
    <a href= "index.html">Home</a>
    <a href= "products.html">Menu</a>
    <!-- Cart link with cart count number -->
    <a href="cart.html">Cart (<span class="cart-count">0</span>)</a>
  </nav>
</header>

<!-- Cart Page -->
  <main class="cart-page">
    <section class="receipt-card">
      <p class="receipt-subtitle">Viet Taste Kaffê</p>
      <h2 class="receipt-title">Order Receipt</h2>

      <div id="cart-content"></div>

      <div class="receipt-buttons">
        <a href="products.html" class="btn btn-secondary">Back to Menu</a>
        <button class="btn" onclick="clearCart(); renderCart(); updateCartCount()">
        Clear Cart
        </button>
        <button class="btn" onclick="checkout()">
        Pay Now
        </button>
      </div>
    </section>
  </main>

  <!-- Share cart data -->
  <script src="cart.js"></script>

<!-- =========================
    DISPLAY ITEMS IN CART
  ========================== -->

  <script>
    // Get current cart data from cart.js
    function renderCart() {
      const cart = getCart();
      const cartContent = document.getElementById("cart-content");

    // Cart is empty => empty message 
      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="receipt-empty">
            <p>Your cart is empty.</p>
          </div>
        `;
        return;
      }

      // Variable for all cart items + total price
      let html = "";
      let total = 0;

      /* Loop through each product in cart */
      cart.forEach(item => {
        const subtotal = item.price * item.quantity;
        total += subtotal; // Add subtotal into final total


      // Create one cart row for each item
        html += `
        <div class="cart-row">

             <!-- Row 1: Product name + qty controls -->
                <div class="cart-row-top">
                <span class="cart-item-name">${item.name}</span>
                <div class="cart-qty-controls">
                    <button onclick="handleDecrease('${item.id}')">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="handleIncrease('${item.id}')">+</button>
                </div>
                </div>

              <!-- Row 2: unit price + remove link -->
            
            <div class="cart-item-bottom">
                <span class="cart-item-unit">$${item.price}</span>
                <button class="remove-link" onclick="handleRemove('${item.id}')">
                Remove
                </button>
            </div>
            
        </div>

        <!-- Divider line between products -->
        <div class="receipt-divider"></div>
        `;
      });

      // Add final total section at the bottom
      html += `
        <div class="receipt-line total-line">
          <span>Total</span>
          <span>${total} $</span>
        </div>
      `;

      // Insert the full HTML into cart-content
      cartContent.innerHTML = html;
    }

/* =========================
    INCREASE ITEM QUANTITY
    ========================== */

    function handleIncrease(id) {
      increaseItem(id);
      renderCart();
      updateCartCount();
    }

/* =========================
    DECREASE ITEM QUANTITY
    ========================== */

    function handleDecrease(id) {
      decreaseItem(id);
      renderCart();
      updateCartCount();
    }

/* =========================
    REMOVE ITEM
    ========================== */
    function handleRemove(id) {
      removeItem(id);
      renderCart();
      updateCartCount();
    }

/* =========================
    CHECKOUT
    ========================== */
    function checkout() {
      alert("Thank you for your order!");
      clearCart();
      renderCart();
      updateCartCount();
    }

/* =========================
    INITIAL PAGE LOAD
    ========================== */
    document.addEventListener("DOMContentLoaded", renderCart);
    
  </script>

    <!-- Footer of the website -->
    <footer>
        <p>Created by Minh Anh Tran | Front-end Fundamentals</p>
        <p>Graphic Design and Web Development</p>
        <p>Jönköping University 2026</p>
    </footer>


</body>
</html>
